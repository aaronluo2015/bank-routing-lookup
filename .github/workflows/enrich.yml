name: Enrich Bank Data

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Crawl myswiftcodes.com full database
        run: npx tsx scripts/crawl-myswiftcodes.ts

      - name: Generate supplementary data
        run: npx tsx scripts/generate-banks.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/banks.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: auto-enrich bank data [skip ci]"
            git push
          fi
