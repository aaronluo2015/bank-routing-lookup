name: Enrich Bank Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Generate baseline data
        run: npx tsx scripts/generate-banks.ts

      - name: Crawl myswiftcodes (batch 0-500)
        run: node scripts/crawl.cjs 0 500

      - name: Crawl myswiftcodes (batch 500-1000)
        run: node scripts/crawl.cjs 500 500

      - name: Crawl myswiftcodes (batch 1000-1500)
        run: node scripts/crawl.cjs 1000 500

      - name: Crawl myswiftcodes (batch 1500-2000)
        run: node scripts/crawl.cjs 1500 500

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/chunks/
          if git diff --staged --quiet; then echo "No changes"; else git commit -m "chore: auto-enrich bank data [skip ci]" && git push; fi
